<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jay Patel Portfolio - Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .contact-section { margin-top: 20px; }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="text-center p-5 bg-primary text-white">
      <h1>Contact Me</h1>
    </header>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg bg-light shadow-sm">
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav">
          <a class="nav-link " href="index.html">Home</a> <!-- No active class here -->
          <a class="nav-link " href="portfolio.html">Portfolio</a> <!-- Active class here -->
          <a class="nav-link active" href="contact.html">Contact Me</a>
        </div>
      </div>
    </div>
  </nav>
    <!-- Contact Form -->
    <section class="container contact-section">
      <h2 class="text-center">Get In Touch</h2>
      <form class="mt-4">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>

      <div class="text-center mt-4">
        <p>Or reach me directly:</p>
        <p>Email: jaybpatel987@gmail.com | Cell: +16822566135</p>
        <p><a href="https://www.linkedin.com/in/jaypatel87/">LinkedIn</a> | <a href="https://github.com/JayPatel0870">GitHub</a></p>
      </div>
    </section>

    <footer class="bg-primary text-center text-white py-4 mt-5">
      <p>© 2024 Jay Patel. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
